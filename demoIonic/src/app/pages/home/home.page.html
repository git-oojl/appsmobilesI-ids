<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>TaskList v2</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-item>
      <ion-input
        type="text"
        placeholder="Ingresa una nueva tarea..."
        name="task"
        [(ngModel)]="newTaskStr"/>

        <ion-button>
          <ion-icon name="add-circle-outline"></ion-icon>
        </ion-button>

    </ion-item>

</ion-content>
