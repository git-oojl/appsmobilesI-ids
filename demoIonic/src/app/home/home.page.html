<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Apps Moviles</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-item>
      <ion-label position="stacked">Nueva tarea</ion-label>
      <ion-input [(ngModel)]="newTaskStr" placeholder="Ejem: Estudiar Typescript"></ion-input>
  </ion-item>

  <ion-button expand="block" color="secondary" (click)="addTask()">Agregar tarea</ion-button>

  <ion-list>
    @for( task of tasks; track task.id){
    <ion-item>
      <label>{{ task.titulo }}</label>
    </ion-item>
    }

  </ion-list>
</ion-content>
